workflows:
  - name: workflow.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - uses: actions/setup-go@60a0d9590ef291ceca015d0a41334550cfc133a8
              with:
                go-version: ${{ matrix.go }}

expected:
  exit_code: 0
  stdout: ""
  stderr: |
    no errors found
