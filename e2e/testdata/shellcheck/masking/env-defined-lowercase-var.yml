# A lowercase variable defined in a step env: block is invisible to shellcheck,
# which would report SC2154. SC2154 is excluded, so this is clean.
workflows:
  - name: ci.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 5
          steps:
            - run: echo "$x"
              env:
                x: "foo bar"
expected:
  exit_code: 0
  stdout: ""
  stderr: |
    ✓ 1 file checked, no errors found
