# Ignoring one code leaves other findings on the same line reported.
workflows:
  - name: ci.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 5
          steps:
            - run: cd /tmp; echo $y # ghasec-ignore:shellcheck/SC2086
expected:
  exit_code: 1
  stdout: ""
  stderr: |
    --> {{.Dir}}/ci.yml:8:14
    ...
    3 | jobs:
    4 |   build:
    ...
    7 |     steps:
    8 |       - run: cd /tmp; echo $y # ghasec-ignore:shellcheck/SC2086
      |              ^^^^^^^ Use 'cd ... || exit' or 'cd ... || return' in case cd fails. (shellcheck/SC2164)
      Ref: https://www.shellcheck.net/wiki/SC2164

    ✗ 1 error found in 1 of 1 file
