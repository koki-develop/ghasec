workflows:
  - name: workflow.yml
    content: |
      on: push
      permissions: {}
      jobs:
        valid:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
              with:
                app-id: id
                private-key: key
                permission-contents: write
