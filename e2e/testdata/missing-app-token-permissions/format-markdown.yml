args: --format markdown
workflows:
  - name: workflow.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
              with:
                app-id: id

expected:
  exit_code: 1
  stdout: |
    ## {{.Dir}}/workflow.yml:8:15

    ```yaml
          - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
    ```

    - **Rule**: missing-app-token-permissions
    - **Message**: "permission-*" input must be set in "with"
    - **Why**: Without explicit permission-* inputs, the token inherits every permission the GitHub App installation has. A compromised downstream step can exploit this over-privileged token
    - **Fix**: Add one or more permission-* inputs to the with section to request only the permissions needed (e.g., permission-contents: read)
    - **Ref**: https://github.com/koki-develop/ghasec/blob/main/rules/missing-app-token-permissions/README.md

