# When two rules fire on the same line, they are sorted by column.
# checkout-persist-credentials fires at col 15 (start of action ref),
# unpinned-action fires at col 32 (after @).
workflows:
  - name: same-line-column-order.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - uses: actions/checkout@v6

expected:
  exit_code: 1
  stdout: ""
  stderr: |
    --> {{.Dir}}/same-line-column-order.yml:8:15
    ...
    3 | jobs:
    4 |   build:
    ...
    7 |     steps:
    8 |       - uses: actions/checkout@v6
      |               ^^^^^^^^^^^^^^^^^^^ "persist-credentials: false" must be set in "with" (checkout-persist-credentials)
      Ref: https://github.com/koki-develop/ghasec/blob/main/rules/checkout-persist-credentials/README.md

    --> {{.Dir}}/same-line-column-order.yml:8:32
    ...
    3 | jobs:
    4 |   build:
    ...
    7 |     steps:
    8 |       - uses: actions/checkout@v6
      |                                ^^ "actions/checkout@v6" must be pinned to a full length commit SHA (unpinned-action)
      Ref: https://github.com/koki-develop/ghasec/blob/main/rules/unpinned-action/README.md

    2 errors found in 1 file
