# Errors from different rules across multiple jobs are interleaved by position.
# default-permissions (line 1) < unpinned-action on setup-go (line 7) <
# checkout-persist-credentials (line 12) < unpinned-action on checkout (line 12).
workflows:
  - name: interleaved-across-jobs.yml
    content: |
      on: push
      jobs:
        first:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - uses: actions/setup-go@v5
        second:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - uses: actions/checkout@v6

expected:
  exit_code: 1
  stdout: ""
  stderr: |
    --> {{.Dir}}/interleaved-across-jobs.yml:1:1
    1 | on: push
      | ^ "permissions: {}" must be set; grant permissions per job instead (default-permissions)
    ...
      Ref: https://github.com/koki-develop/ghasec/blob/main/rules/default-permissions/README.md

    --> {{.Dir}}/interleaved-across-jobs.yml:7:32
    ...
    2 | jobs:
    3 |   first:
    ...
    6 |     steps:
    7 |       - uses: actions/setup-go@v5
      |                                ^^ "actions/setup-go@v5" must be pinned to a full length commit SHA (unpinned-action)
    ...
      Ref: https://github.com/koki-develop/ghasec/blob/main/rules/unpinned-action/README.md

    --> {{.Dir}}/interleaved-across-jobs.yml:12:15
    ...
     2 | jobs:
    ...
     8 |   second:
    ...
    11 |     steps:
    12 |       - uses: actions/checkout@v6
       |               ^^^^^^^^^^^^^^^^^^^ "persist-credentials: false" must be set in "with" (checkout-persist-credentials)
      Ref: https://github.com/koki-develop/ghasec/blob/main/rules/checkout-persist-credentials/README.md

    --> {{.Dir}}/interleaved-across-jobs.yml:12:32
    ...
     2 | jobs:
    ...
     8 |   second:
    ...
    11 |     steps:
    12 |       - uses: actions/checkout@v6
       |                                ^^ "actions/checkout@v6" must be pinned to a full length commit SHA (unpinned-action)
      Ref: https://github.com/koki-develop/ghasec/blob/main/rules/unpinned-action/README.md

    4 errors found in 1 file
