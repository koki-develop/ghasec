# Within each file, errors are sorted by position.
# File order is alphabetical (a.yml before b.yml).
# In b.yml, unpinned-action on setup-go (line 7) comes before
# checkout-persist-credentials (line 8) and unpinned-action on checkout (line 8).
workflows:
  - name: a.yml
    content: |
      on: push
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - uses: actions/checkout@v6
