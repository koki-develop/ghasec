# Sorting applies after ignore directive filtering.
# unpinned-action is suppressed on line 6, so remaining errors are:
# default-permissions (line 1), checkout-persist-credentials (line 6), unpinned-action (line 7).
workflows:
  - name: with-ignore-directive.yml
    content: |
      on: push
      jobs:
        build:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v6 # ghasec-ignore:unpinned-action
            - uses: actions/setup-go@v5

expected:
