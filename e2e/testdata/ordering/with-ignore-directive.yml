# Sorting applies after ignore directive filtering.
# unpinned-action is suppressed on line 7, so remaining errors are:
# default-permissions (line 1), checkout-persist-credentials (line 7), unpinned-action (line 8).
workflows:
  - name: with-ignore-directive.yml
    content: |
      on: push
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - uses: actions/checkout@v6 # ghasec-ignore:unpinned-action
            - uses: actions/setup-go@v5

expected:
  exit_code: 1
  stdout: ""
  stderr: |
    --> {{.Dir}}/with-ignore-directive.yml:1:1
    1 | on: push
      | ^ "permissions: {}" must be set; grant permissions per job instead (default-permissions)
    ...
      Ref: https://github.com/koki-develop/ghasec/blob/main/rules/default-permissions/README.md

    --> {{.Dir}}/with-ignore-directive.yml:7:15
    ...
    2 | jobs:
    3 |   build:
    ...
    6 |     steps:
    7 |       - uses: actions/checkout@v6 # ghasec-ignore:unpinned-action
      |               ^^^^^^^^^^^^^^^^^^^ "persist-credentials: false" must be set in "with" (checkout-persist-credentials)
    ...
      Ref: https://github.com/koki-develop/ghasec/blob/main/rules/checkout-persist-credentials/README.md

    --> {{.Dir}}/with-ignore-directive.yml:8:32
    ...
    2 | jobs:
    3 |   build:
    ...
    6 |     steps:
    ...
    8 |       - uses: actions/setup-go@v5
      |                                ^^ "actions/setup-go@v5" must be pinned to a full length commit SHA (unpinned-action)
      Ref: https://github.com/koki-develop/ghasec/blob/main/rules/unpinned-action/README.md

    3 errors found in 1 file
