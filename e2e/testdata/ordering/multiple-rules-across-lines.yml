# Errors from three different rules sorted strictly by line number.
# default-permissions (line 2), unpinned-action (line 8), unpinned-action (line 9),
# checkout-persist-credentials (line 11).
workflows:
  - name: multiple-rules-across-lines.yml
    content: |
      on: push
      permissions:
        contents: read
      jobs:
        build:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/setup-go@v5
            - uses: actions/checkout@v6
              with:
                persist-credentials: true

expected:
  exit_code: 1
  stdout: ""
  stderr: |
    --> {{.Dir}}/multiple-rules-across-lines.yml:2:1
    ...
    2 | permissions:
      | ^^^^^^^^^^^ "permissions" must be {}; grant permissions per job instead (default-permissions)
    3 |   contents: read
    ...
      Ref: https://github.com/koki-develop/ghasec/blob/main/rules/default-permissions/README.md

    --> {{.Dir}}/multiple-rules-across-lines.yml:8:32
    ...
    4 | jobs:
    5 |   build:
    ...
    7 |     steps:
    8 |       - uses: actions/setup-go@v5
      |                                ^^ "actions/setup-go@v5" must be pinned to a full length commit SHA (unpinned-action)
    ...
      Ref: https://github.com/koki-develop/ghasec/blob/main/rules/unpinned-action/README.md

    --> {{.Dir}}/multiple-rules-across-lines.yml:9:32
    ...
    4 | jobs:
    5 |   build:
    ...
    7 |     steps:
    ...
    9 |       - uses: actions/checkout@v6
      |                                ^^ "actions/checkout@v6" must be pinned to a full length commit SHA (unpinned-action)
    ...
      Ref: https://github.com/koki-develop/ghasec/blob/main/rules/unpinned-action/README.md

    --> {{.Dir}}/multiple-rules-across-lines.yml:11:32
    ...
     4 | jobs:
     5 |   build:
    ...
     7 |     steps:
    ...
     9 |       - uses: actions/checkout@v6
    10 |         with:
    11 |           persist-credentials: true
       |                                ^^^^ "persist-credentials: false" must be set in "with" (checkout-persist-credentials)
      Ref: https://github.com/koki-develop/ghasec/blob/main/rules/checkout-persist-credentials/README.md

