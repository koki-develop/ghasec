# Action files also have errors sorted by position.
# checkout-persist-credentials (line 4, col 13) < unpinned-action (line 4, col 30) <
# unpinned-action (line 5, col 30).
actions:
  - name: action.yml
    content: |
      runs:
        using: composite
        steps:
          - uses: actions/checkout@v6
          - uses: actions/setup-go@v5

expected:
  exit_code: 1
  stdout: ""
  stderr: |
    --> {{.Dir}}/action.yml:4:13
    1 | runs:
    ...
    3 |   steps:
    4 |     - uses: actions/checkout@v6
      |             ^^^^^^^^^^^^^^^^^^^ "persist-credentials: false" must be set in "with" (checkout-persist-credentials)
    ...
      Ref: https://github.com/koki-develop/ghasec/blob/main/rules/checkout-persist-credentials/README.md

    --> {{.Dir}}/action.yml:4:30
    1 | runs:
    ...
    3 |   steps:
    4 |     - uses: actions/checkout@v6
      |                              ^^ "actions/checkout@v6" must be pinned to a full length commit SHA (unpinned-action)
    ...
      Ref: https://github.com/koki-develop/ghasec/blob/main/rules/unpinned-action/README.md

    --> {{.Dir}}/action.yml:5:30
    1 | runs:
    ...
    3 |   steps:
    ...
    5 |     - uses: actions/setup-go@v5
      |                              ^^ "actions/setup-go@v5" must be pinned to a full length commit SHA (unpinned-action)
      Ref: https://github.com/koki-develop/ghasec/blob/main/rules/unpinned-action/README.md

    3 errors found in 1 file
