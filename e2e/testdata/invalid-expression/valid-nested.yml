workflows:
  - name: workflow.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - run: echo ${{ contains(format('{0}', 'hello'), 'ell') }} # ghasec-ignore:script-injection
            - run: echo ${{ (true && (false || true)) }} # ghasec-ignore:script-injection

expected:
  exit_code: 0
  stdout: ""
  stderr: |
    no errors found
