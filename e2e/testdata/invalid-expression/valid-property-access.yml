workflows:
  - name: workflow.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - run: echo ${{ github.event.action }} # ghasec-ignore:script-injection
            - run: echo ${{ github.event['action'] }} # ghasec-ignore:script-injection
            - run: echo ${{ github.event.*.name }} # ghasec-ignore:script-injection

expected:
  exit_code: 0
  stdout: ""
  stderr: |
    no errors found
