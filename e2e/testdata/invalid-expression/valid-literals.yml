workflows:
  - name: workflow.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - run: echo ${{ true }} # ghasec-ignore:script-injection
            - run: echo ${{ false }} # ghasec-ignore:script-injection
            - run: echo ${{ null }} # ghasec-ignore:script-injection
            - run: echo ${{ 42 }} # ghasec-ignore:script-injection
            - run: echo ${{ 3.14 }} # ghasec-ignore:script-injection
            - run: echo ${{ 0xff }} # ghasec-ignore:script-injection
            - run: echo ${{ 1e10 }} # ghasec-ignore:script-injection
            - run: echo ${{ 'hello world' }} # ghasec-ignore:script-injection

expected:
  exit_code: 0
  stdout: ""
  stderr: |
    no errors found
