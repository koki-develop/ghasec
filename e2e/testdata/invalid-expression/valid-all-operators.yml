workflows:
  - name: workflow.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - run: echo ${{ 1 == 1 }} # ghasec-ignore:script-injection
            - run: echo ${{ 1 != 2 }} # ghasec-ignore:script-injection
            - run: echo ${{ 1 < 2 }} # ghasec-ignore:script-injection
            - run: echo ${{ 1 <= 2 }} # ghasec-ignore:script-injection
            - run: echo ${{ 2 > 1 }} # ghasec-ignore:script-injection
            - run: echo ${{ 2 >= 1 }} # ghasec-ignore:script-injection
            - run: echo ${{ true && true }} # ghasec-ignore:script-injection
            - run: echo ${{ true || false }} # ghasec-ignore:script-injection
            - run: echo ${{ !false }} # ghasec-ignore:script-injection
            - run: echo ${{ github.event_name }} # ghasec-ignore:script-injection
            - run: echo ${{ github.event['action'] }} # ghasec-ignore:script-injection
            - run: echo ${{ (true) }} # ghasec-ignore:script-injection

expected:
  exit_code: 0
  stdout: ""
  stderr: |
    ✓ 1 file checked, no errors found
