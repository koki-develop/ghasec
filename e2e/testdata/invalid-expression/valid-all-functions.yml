workflows:
  - name: workflow.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - run: echo ${{ contains('hello', 'ell') }} # ghasec-ignore:script-injection
            - run: echo ${{ startsWith('hello', 'he') }} # ghasec-ignore:script-injection
            - run: echo ${{ endsWith('hello', 'lo') }} # ghasec-ignore:script-injection
            - run: echo ${{ format('a{0}b', 'x') }} # ghasec-ignore:script-injection
            - run: echo ${{ join(github.event.*.name, ', ') }} # ghasec-ignore:script-injection
            - run: echo ${{ toJSON(github.event) }} # ghasec-ignore:script-injection
            - run: echo ${{ fromJSON('{}') }} # ghasec-ignore:script-injection
            - run: echo ${{ hashFiles('**/*.lock') }} # ghasec-ignore:script-injection
            - run: echo ${{ success() }} # ghasec-ignore:script-injection
            - run: echo ${{ failure() }} # ghasec-ignore:script-injection
            - run: echo ${{ always() }} # ghasec-ignore:script-injection
            - run: echo ${{ cancelled() }} # ghasec-ignore:script-injection
            - run: echo ${{ format('{0}', 'a') }} # ghasec-ignore:script-injection

expected:
  exit_code: 0
  stdout: ""
  stderr: |
    ✓ 1 file checked, no errors found
