workflows:
  - name: workflow.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          permissions:
            contents: read
          steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                persist-credentials: false

expected:
  exit_code: 0
  stdout: |
    No errors found in 1 file.
  stderr: ""
