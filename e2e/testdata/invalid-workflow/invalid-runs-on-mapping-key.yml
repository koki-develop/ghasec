## This test documents a SchemaStore limitation: runs-on mapping keys are not
## constrained by additionalProperties:false in the JSON Schema.
## See docs/superpowers/specs/2026-03-22-schemastore-limitations.md (F2).
##
## The test verifies that runs-on with unknown mapping keys is accepted (no error).
workflows:
  - name: invalid-runs-on-mapping-key.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          timeout-minutes: 10
          runs-on:
            foo: bar
          steps:
            - run: echo hi

expected:
  exit_code: 0
  stdout: ""
  stderr: |
    ✓ 1 file checked, no errors found
