## This test documents a SchemaStore limitation: runs-on sequence element types
## are not fully checked. See docs/superpowers/specs/2026-03-22-schemastore-limitations.md.
##
## The test verifies that runs-on with non-string elements is accepted (no error).
workflows:
  - name: invalid-runs-on-sequence-element-distant.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          timeout-minutes: 10
          runs-on:
            - self-hosted
            - linux
            - x64
            - gpu
            - 123
          steps:
            - run: echo hi

expected:
  exit_code: 0
  stdout: ""
  stderr: |
    no errors found
