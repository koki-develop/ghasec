workflows:
  - name: step-duplicate-id-expression.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - id: ${{ steps.foo.outputs.id }}
              run: echo a
            - id: ${{ steps.foo.outputs.id }}
              run: echo b

expected:
  exit_code: 0
  stdout: ""
  stderr: |
    no errors found
