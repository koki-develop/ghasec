workflows:
  - name: step-wait-all-valid.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - id: server
              run: ./start-server.sh
              background: true
            - wait-all: true

