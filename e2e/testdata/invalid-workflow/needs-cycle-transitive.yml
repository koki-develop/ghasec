workflows:
  - name: needs-cycle-transitive.yml
    content: |
      on: push
      jobs:
        a:
          needs: c
          runs-on: ubuntu-latest
          steps:
            - run: echo a
        b:
          needs: a
          runs-on: ubuntu-latest
          steps:
            - run: echo b
        c:
          needs: b
          runs-on: ubuntu-latest
          steps:
            - run: echo c

