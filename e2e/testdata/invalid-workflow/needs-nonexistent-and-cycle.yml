workflows:
  - name: needs-nonexistent-and-cycle.yml
    content: |
      on: push
      jobs:
        a:
          needs: [b, nonexistent]
          runs-on: ubuntu-latest
          steps:
            - run: echo a
        b:
          needs: a
          runs-on: ubuntu-latest
          steps:
            - run: echo b

expected:
  exit_code: 1
  stdout: ""
  stderr: |
