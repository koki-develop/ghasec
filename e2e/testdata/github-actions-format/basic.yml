args: --format github-actions
workflows:
  - name: workflow.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - uses: actions/checkout@v6
              with:
                persist-credentials: false

expected:
  exit_code: 1
  stdout: |
    ::error title=unpinned-action,file={{.Dir}}/workflow.yml,line=8::{{.Dir}}/workflow.yml:8:32: "actions/checkout@v6" must be pinned to a full length commit SHA
  stderr: ""
