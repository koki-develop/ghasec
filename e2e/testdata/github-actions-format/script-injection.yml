workflows:
  - name: workflow.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - run: |
                echo ${{ github.event.issue.title }}
                echo "done"

expected:
  exit_code: 1
  stdout: |
    ::error title=script-injection,file={{.Dir}}/workflow.yml,line=9::{{.Dir}}/workflow.yml:9:16: "run" must not contain expressions; use environment variables instead
  stderr: ""
