workflows:
  - name: local-and-docker-actions.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          steps:
            - uses: ./local-action
            - uses: docker://alpine:3.8
            - run: echo hi
  - name: multiple-unpinned-actions.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v6
              with:
                persist-credentials: false
            - uses: actions/setup-go@v5
            - run: echo hi
  - name: unpinned-action.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v6
              with:
                persist-credentials: false

