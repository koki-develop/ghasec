workflows:
  - name: ci.yml
    content: |
      on: [push, pull_request]
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                persist-credentials: false

expected:
  exit_code: 0
  stdout: ""
  stderr: |
    no errors found
