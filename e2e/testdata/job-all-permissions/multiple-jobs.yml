workflows:
  - name: multiple-jobs.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          permissions: read-all
          steps:
            - run: echo build
        deploy:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          permissions: write-all
          steps:
            - run: echo deploy

expected:
