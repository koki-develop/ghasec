workflows:
  - name: multiple-jobs.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          permissions: read-all
          steps:
            - run: echo build
        deploy:
          runs-on: ubuntu-latest
          permissions: write-all
          steps:
            - run: echo deploy

expected:
