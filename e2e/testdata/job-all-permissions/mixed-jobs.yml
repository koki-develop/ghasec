workflows:
  - name: mixed-jobs.yml
    content: |
      on: push
      permissions: {}
      jobs:
        safe:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          permissions:
            contents: read
          steps:
            - run: echo safe
        unsafe:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          permissions: write-all
          steps:
            - run: echo unsafe

