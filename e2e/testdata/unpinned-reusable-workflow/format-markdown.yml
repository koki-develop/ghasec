args: --format markdown
workflows:
  - name: workflow.yml
    content: |
      on: push
      permissions: {}
      jobs:
        call:
          uses: org/repo/.github/workflows/ci.yml@v1.0.0

expected:
  exit_code: 1
  stdout: |
    ## {{.Dir}}/workflow.yml:5:45
    
    ```yaml
        uses: org/repo/.github/workflows/ci.yml@v1.0.0
    ```
    
    - **Rule**: unpinned-reusable-workflow
    - **Message**: "org/repo/.github/workflows/ci.yml@v1.0.0" must be pinned to a full length commit SHA
    - **Why**: Git tags and branches are mutable. Reusable workflows execute with secrets the caller passes in, so a compromised upstream that moves a tag can run malicious code with access to those secrets on the next run
    - **Fix**: Pin to the full 40-character commit SHA. Add the version as an inline comment to keep it human-readable
    - **Ref**: https://github.com/koki-develop/ghasec/blob/main/rules/unpinned-reusable-workflow/README.md
    
    ---
    
    1 error found in 1 of 1 file.
