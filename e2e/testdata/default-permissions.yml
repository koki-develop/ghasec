workflows:
  - name: default-permissions-non-empty-mapping.yml
    content: |
      on: push
      permissions:
        contents: read
      jobs:
        build:
          runs-on: ubuntu-latest
          steps:
            - run: echo hi
  - name: default-permissions-non-empty.yml
    content: |
      on: push
      permissions: read-all
      jobs:
        build:
          runs-on: ubuntu-latest
          steps:
            - run: echo hi
  - name: default-permissions-valid.yml
    content: |
      on: push
      permissions: {}
