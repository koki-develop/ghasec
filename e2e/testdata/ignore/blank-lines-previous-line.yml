workflows:
  - name: workflow.yml
    content: |
      on: push

      permissions: {}

      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:

            # ghasec-ignore:unpinned-action
            - uses: actions/checkout@v6
              with:
                persist-credentials: false

expected:
  exit_code: 0
  stdout: ""
  stderr: |
    ✓ 1 file checked, no errors found
