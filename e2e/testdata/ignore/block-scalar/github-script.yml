workflows:
  - name: workflow.yml
    content: |
      on: issues
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - uses: actions/github-script@60a0d9590ef291ceca015d0a41334550cfc133a8 # v4
              with:
                script: | # ghasec-ignore:script-injection
                  const title = '${{ github.event.issue.title }}';
                  console.log(title);
expected:
  exit_code: 0
  stdout: ""
  stderr: |
    ✓ 1 file checked, no errors found
