args: --format markdown
workflows:
  - name: workflow.yml
    content: |
      on: push
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - uses: docker://alpine:3.8

expected:
  exit_code: 1
  stdout: |
    ## {{.Dir}}/workflow.yml:8:15

    ```yaml
          - uses: docker://alpine:3.8
    ```

    - **Rule**: unpinned-action
    - **Message**: "docker://alpine:3.8" must be pinned to a digest
    - **Why**: Docker image tags are mutable. A compromised or updated registry image can change the contents behind a tag, executing different code silently on the next run
    - **Fix**: Pin to the image digest using the @sha256:... suffix. Keep the tag for human readability
    - **Ref**: https://github.com/koki-develop/ghasec/blob/main/rules/unpinned-action/README.md

