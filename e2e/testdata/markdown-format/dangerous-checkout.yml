args: --format markdown
workflows:
  - name: workflow.yml
    content: |
      on: pull_request_target
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                persist-credentials: false
                ref: ${{ github.event.pull_request.head.sha }}
expected:
  exit_code: 1
  stdout: |
    ## {{.Dir}}/workflow.yml:11:16

    ```yaml
              ref: ${{"{{" }} github.event.pull_request.head.sha }}
    ```

    - **Rule**: dangerous-checkout
    - **Message**: "ref" must not reference pull request head in a "pull_request_target" workflow
    - **Why**: Workflows triggered by pull_request_target or workflow_run run with access to repository secrets. Checking out pull request head code — via a ref pointing to the fork head, a repository input pointing to the fork, or allow-unsafe-pr-checkout: true — lets attacker-controlled code execute with those secrets
    - **Fix**: Remove ref and repository inputs that point to the fork pull request head, and do not set allow-unsafe-pr-checkout to true
    - **Ref**: https://github.com/koki-develop/ghasec/blob/main/rules/dangerous-checkout/README.md

