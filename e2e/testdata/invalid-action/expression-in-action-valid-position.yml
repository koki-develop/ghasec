actions:
  - name: action.yml
    content: |
      name: Test Action
      description: A test
      inputs:
        token:
          description: Auth token
          default: ${{ github.token }}
      outputs:
        result:
          description: Result
          value: ${{ steps.test.outputs.result }}
      runs:
        using: composite
        steps:
          - id: test
            if: ${{ github.actor == 'bot' }}
            run: echo ${{ github.actor }} # ghasec-ignore:script-injection
            shell: bash

expected:
  exit_code: 0
  stdout: ""
  stderr: |
    ✓ 1 file checked, no errors found
