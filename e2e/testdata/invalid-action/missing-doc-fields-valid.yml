actions:
  - name: action.yml
    content: |
      inputs:
        my-input:
          default: hello
      outputs:
        my-output:
          value: ${{ steps.step1.outputs.result }}
      runs:
        using: composite
        steps:
          - id: step1
            run: echo hi
            shell: bash

expected:
  exit_code: 0
  stdout: ""
  stderr: "no errors found\n"
