workflows:
  - name: multi.yml
    content: |
      on: pull_request
      permissions: {}
      jobs:
        build:
          if: github.actor == 'dependabot[bot]'
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - if: "github.actor != 'renovate[bot]'"
              run: echo hi
        test:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - if: github.actor == 'github-actions[bot]'
              run: echo hi

