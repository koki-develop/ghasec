workflows:
  - name: dangerous-checkout.yml
    content: |
      on:
        workflow_run:
          workflows: [CI]
          types: [completed]
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
              with:
                persist-credentials: false
                repository: ${{ github.event.workflow_run.pull_requests[0].base.repo.full_name }}
expected:
  exit_code: 0
  stdout: ""
  stderr: |
    ✓ 1 file checked, no errors found
