workflows:
  - name: dangerous-checkout.yml
    content: |
      on: pull_request_target
      permissions: {}
      jobs:
        build:
          runs-on: ubuntu-latest
          timeout-minutes: 10
          steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
              with:
                persist-credentials: false
                ref: ${{ github.head_ref }}
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
              with:
                persist-credentials: false
                allow-unsafe-pr-checkout: true
