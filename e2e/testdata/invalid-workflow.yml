workflows:
  - name: empty-file.yml
    content: ""
  - name: empty-jobs.yml
    content: |
      on: push
      jobs:
  - name: invalid-job-uses-type.yml
    content: |
      on: push
      jobs:
        build:
          uses:
            - something
  - name: invalid-jobs-type.yml
    content: |
      on: push
      jobs:
        - build
        - test
  - name: invalid-on-type.yml
    content: |
      on: 123
      jobs:
        build:
          runs-on: ubuntu-latest
          steps:
            - run: echo hi
  - name: invalid-runs-on-type.yml
    content: |
      on: push
      jobs:
        build:
          runs-on: 123
          steps:
            - run: echo hi
  - name: invalid-steps-type.yml
    content: |
      on: push
      jobs:
        build:
          runs-on: ubuntu-latest
          steps: "not a sequence"
  - name: job-has-both-runs-on-and-uses.yml
    content: |
      on: push
      jobs:
        build:
          runs-on: ubuntu-latest
          uses: octo-org/this-repo/.github/workflows/workflow.yml@main
  - name: job-has-both-uses-and-steps.yml
    content: |
      on: push
      jobs:
        build:
          uses: octo-org/this-repo/.github/workflows/workflow.yml@main
          steps:
            - run: echo hi
  - name: job-missing-runs-on-and-uses.yml
    content: |
      on: push
      jobs:
        build:
          steps:
            - run: echo hi
  - name: job-not-mapping.yml
    content: |
      on: push
      jobs:
        build: "not a mapping"
  - name: missing-jobs.yml
    content: |
      on: push
      name: CI
  - name: missing-on-and-jobs.yml
    content: |
      name: CI
  - name: missing-on.yml
    content: |
      jobs:
        build:
          runs-on: ubuntu-latest
          steps:
            - run: echo hi
  - name: non-mapping-document.yml
    content: |
      - foo
      - bar

