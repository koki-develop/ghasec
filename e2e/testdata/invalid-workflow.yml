  - name: valid-full-workflow.yml
    content: |
      name: CI
      run-name: Build
      on:
        push:
          branches: [main]
        pull_request:
        schedule:
          - cron: "0 0 * * *"
        workflow_dispatch:
          inputs:
            name:
              description: Name
              type: string
              required: false
              default: world
      permissions:
        contents: read
        issues: write
      env:
        CI: "true"
      defaults:
        run:
          shell: bash
          working-directory: src
      concurrency:
        group: ci
        cancel-in-progress: true
      jobs:
        build:
          name: Build
          runs-on: ubuntu-latest
          permissions:
            contents: read
          environment: production
          env:
            NODE_ENV: production
          defaults:
            run:
              shell: bash
          if: true
          timeout-minutes: 30
          strategy:
            matrix:
              os: [ubuntu-latest]
            fail-fast: false
          continue-on-error: false
          concurrency:
            group: build
            cancel-in-progress: false
          steps:
            - id: checkout
              name: Checkout
              uses: actions/checkout@v4
              with:
                fetch-depth: "0"
            - name: Build
              run: echo build
              shell: bash
              working-directory: src
              env:
                DEBUG: "true"
              continue-on-error: false
              timeout-minutes: 10
              if: true
        call:
          name: Call
          needs: [build]
          uses: org/repo/.github/workflows/ci.yml@main
          with:
            name: test
          secrets: inherit
          permissions:
            contents: read
          if: true
          strategy:
            matrix:
              os: [ubuntu-latest]
          concurrency: call-group
  - name: workflow-dispatch-unknown-key.yml
    content: |
      on:
        workflow_dispatch:
          foo: bar
      jobs:
