name: ghasec

permissions: {}

defaults:
  run:
    shell: bash

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ghasec:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run ghasec
        uses: koki-develop/ghasec-action@fd1b41a92f110e3832fed139d1cec6d84dab84b9 # v1.0.1
        with:
          github-token: ${{ github.token }}
          online: true
