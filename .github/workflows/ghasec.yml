name: ghasec

permissions: {}

defaults:
  run:
    shell: bash

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ghasec:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Run ghasec
        uses: koki-develop/ghasec-action@571d442ebbb17c6800d933c870d5857e764c3574 # v1.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          online: true
